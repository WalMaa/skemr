version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries"
    schema: "schema.sql"
    gen:
      go:
        emit_json_tags: true
        out: "db/sqlc"
        emit_interface: true
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
