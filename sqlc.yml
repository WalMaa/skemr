version: "2"
sql:
  - engine: "postgresql"
    queries: "./skemr-api/db/queries"
    schema: "./skemr-api/db/schema.sql"
    gen:
      go:
        emit_json_tags: true
        out: "./skemr-api/db/sqlc"
        emit_interface: true
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
