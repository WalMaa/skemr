name: build-and-test.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: 'true'

      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: '1.25.0'

      - name: Install mockery
        run: go install github.com/vektra/mockery/v3@v3.5.3

      - name: Generate sqlc
        run: sqlc generate

      - name: Create mocks
        run: mockery

      - name: Build control plane
        run: go build ./skemr-api/...

      - name: Build CLI
        run: go build ./skemr-cli/...

      - name: Test
        run: go test -race -shuffle=on ./skemr-cli/... ./skemr-api/...
