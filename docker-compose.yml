services:
  postgres:
    image: "postgres:latest"
    ports:
      - "5432:5432"
    environment:
      - "POSTGRES_DB=postgres"
      - "POSTGRES_PASSWORD=pass"
      - "POSTGRES_USER=postgres"
  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=local-redis
  gitlab:
    image: "gitlab/gitlab-ce:latest"
    container_name: gitlab
    ports:
      - "80:80"
      - "443:443"
      - "2222:22"
    environment:
        GITLAB_OMNIBUS_CONFIG: |
          external_url 'http://localhost'
          gitlab_rails['initial_root_password'] = 'password'
          gitlab_rails['allow_local_requests_from_web_hooks_and_services'] = true
          gitlab_rails['allow_local_requests_from_system_hooks'] = true
    volumes:
      - "./gitlab/config/gitlab:/etc/gitlab"
      - "./gitlab/logs/gitlab:/var/log/gitlab"
      - "./gitlab/data/gitlab:/var/opt/gitlab"
    extra_hosts:
      - host.docker.internal:host-gateway
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    depends_on:
      - gitlab
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./gitlab-runner/config:/etc/gitlab-runner"
    extra_hosts:
      - host.docker.internal:host-gateway
  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: skemr-smtp4dev
    ports:
      - "5000:80"
      - "5025:25"
    environment:
      - ServerOptions__HostName=smtp4dev
  mailpit:
    image: axllent/mailpit
    container_name: skemr-mailpit
    volumes:
      - mailpit-data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_ENABLE_SPAMASSASSIN: spamassassin:783
  spamassassin:
    image: axllent/spamassassin
    container_name: skemr-spamassassin
    depends_on:
      - mailpit
    ports:
      - "783:783"

volumes:
  mailpit-data: